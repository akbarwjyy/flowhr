version: '3.9'

services:
  # ─── PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: flowhr-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flowhr}
      POSTGRES_USER: ${POSTGRES_USER:-flowhr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowhr_user} -d ${POSTGRES_DB:-flowhr}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend ──────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: flowhr-server
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-flowhr}
      DB_USERNAME: ${POSTGRES_USER:-flowhr_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
      JWT_SECRET: ${JWT_SECRET:-change_me_very_long_secret_key_at_least_256_bits}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

  # ─── Astro Frontend ───────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: flowhr-client
    restart: unless-stopped
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080/api/v1}
    ports:
      - "${ASTRO_PORT:-4321}:4321"
    depends_on:
      - server

volumes:
  pgdata:
    name: flowhr-pgdata
