spring:
  application:
    name: flowhr-server

  config:
    import: optional:file:../.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:5432/db_flowhr
    username: ${DB_USERNAME:flowhr_user}
    password: ${DB_PASSWORD:change_me_strong_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: FlowHR-HikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# --- JWT ---
app:
  jwt:
    secret: ${JWT_SECRET:change_me_very_long_secret_key_at_least_256_bits_for_hs256_algorithm}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# --- Logging ---
logging:
  level:
    com.flowhr: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/flowhr_dev
logging:
  level:
    com.flowhr: DEBUG
    org.springframework.jdbc.core: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
logging:
  level:
    com.flowhr: WARN
